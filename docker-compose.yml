services:

  redis:
    image: redis
    container_name: redis-container

    ports:
      - "6379:6379"

  producer:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: producer-container

    ports:
      - "3000:3000"

    depends_on:
      - redis

    env_file:
      - .env

  worker:
    build:
      context: .
      dockerfile: Dockerfile(1)

    container_name: worker-container

    depends_on:
      - redis

    env_file:
      - .env